<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>W4 練習 Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <div class="header-titles">
        <h1>💬 現代風 Chat</h1>
        <p class="subtitle">iOS Style 對話紀錄</p>
      </div>
      <button class="dark-toggle" onclick="document.body.classList.toggle('dark')">切換深色</button>
    </header>

    <div id="chat-box">
      <div class="message bot">
        嗨！我是練習用的 Chatbot，今天我們要學 Git Branch 🌿
      </div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="iMessage...">
      <button onclick="sendMessage()" aria-label="傳送">
        <svg class="send-icon" viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const text = input.value.trim();

      if (!text) return;

      // 顯示使用者訊息
      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.textContent = text;
      chatBox.appendChild(userDiv);

      // 模擬 bot 回覆
      const botDiv = document.createElement('div');
      botDiv.className = 'message bot';
      botDiv.textContent = `你說了「${text}」，我收到了！`;
      chatBox.appendChild(botDiv);

      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 按 Enter 也能送出
    document.getElementById('user-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>

</body>
</html>
